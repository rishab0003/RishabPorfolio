<svg width="130" height="33" viewBox="0 0 130 33" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- React Atom Logo -->
  <g transform="translate(14, 16.5)">
    <!-- Three ellipse orbits -->
    <ellipse rx="10" ry="4" stroke="#FDFDF0" stroke-width="1.8" fill="none"/>
    <ellipse rx="10" ry="4" stroke="#FDFDF0" stroke-width="1.8" fill="none" transform="rotate(60)"/>
    <ellipse rx="10" ry="4" stroke="#FDFDF0" stroke-width="1.8" fill="none" transform="rotate(120)"/>
    <!-- Center nucleus -->
    <circle r="2.2" fill="#FDFDF0"/>
  </g>
  <!-- Tech Name -->
  <text x="36" y="22" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="600" fill="#FDFDF0" letter-spacing="0.5">React</text>
</svg>
